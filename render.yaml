services:
  - type: web
    name: trading-signals-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POCKET_OPTION_SSID
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PORT
        value: 8000
